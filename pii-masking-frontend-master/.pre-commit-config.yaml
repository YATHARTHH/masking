default_language_version:
  python: python3.12

default_stages: [pre-commit, pre-push]

repos:
  # DevHub repo hygiene — CODEOWNERS and PR template must exist before any commit lands.
  # Python script avoids YAML escaping issues and works on Windows, macOS, and Linux.
  - repo: local
    hooks:
      - id: check-repo-hygiene
        name: CODEOWNERS and PR template exist
        language: system
        entry: python tasks/check_repo_hygiene.py
        pass_filenames: false
        always_run: true

  # General file hygiene and safety checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args:
          - '--unsafe'
        exclude: ^(.*/catalog\.yml)
      - id: check-toml
      - id: check-json
      - id: pretty-format-json
        args:
          - '--autofix'
          - '--no-sort-keys'
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-docstring-first
      - id: check-added-large-files
        exclude: ^(.*conftest\.py|.*_fixtures{0,1}\.py)
      - id: check-symlinks
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-aws-credentials
        args:
          - '--allow-missing-credentials'
      - id: detect-private-key
      - id: mixed-line-ending
      - id: requirements-txt-fixer
      - id: check-executables-have-shebangs
      - id: check-ast
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: no-commit-to-branch
        args:
          - '--branch'
          - develop
          - '--branch'
          - main
        exclude: LICENSE

  # Python — Ruff: linter + formatter, replaces flake8, isort, pyupgrade, autoflake, and black.
  # Rules/config live in ruff.toml. `ruff` lints (with --fix); `ruff-format` formats.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # JavaScript / TypeScript — Biome: lint + format, zero-config (.js/.jsx/.ts/.tsx).
  # Self-contained: pre-commit provisions Node for it; no repo config needed.
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
      - id: biome-check
        additional_dependencies: ['@biomejs/biome@1.9.4']

  # Terraform — canonical formatting (`terraform fmt`). Needs the `terraform` tool (mise.toml).
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt

  # Java — google-java-format. Needs the `java` tool (mise.toml).
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.14.0
    hooks:
      - id: pretty-format-java
        args: ['--autofix']

  # Dockerfile linting — skipped if no Dockerfiles exist in the repo.
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        types: ["dockerfile"]

  # Block .env files from ever being committed.
  - repo: local
    hooks:
      - id: block-env-files
        name: block .env files
        language: fail
        entry: ".env files must not be committed - use .env.example for templates"
        files: '(^|/)\.(env)(\.|$)'
        exclude: '\.env\.example$'

  # detect-secrets: pattern-based scan for API keys, tokens, and high-entropy strings.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        args:
          - '--baseline'
          - '.security.baseline'
        exclude: package-lock\.json|poetry\.lock|\.env\.example

  # gitleaks: scans staged content for secret patterns.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args:
          - '--config=.gitleaks.toml'
          - '--redact'
          - '--verbose'
          - '--no-banner'

  # Semgrep — static security analysis (SAST): finds vulnerability patterns in code
  # (SQL/command injection, unsafe APIs, etc.), not just secrets. Scans changed files.
  # Installed automatically by `mise.toml` setup (pip install ... semgrep), so this
  # local hook just runs it — no separate per-hook install, no manual steps.
  # p/default = curated low-false-positive ruleset; p/secrets = hardcoded-secret rules.
  # `--error` blocks the commit when a finding is reported.
  # NOTE: Semgrep's engine is Linux/macOS-first — verify it runs on Windows before
  # rolling this out team-wide (see the .githooks cross-platform fixes).
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (SAST)
        language: system
        entry: semgrep scan --config p/default --config p/secrets --error --quiet --metrics off
        pass_filenames: true
        types: [text]
        exclude: '(^|/)(\.security\.baseline|package-lock\.json|poetry\.lock)$'
